name: Project Workflow
on:
  push:
   branches: ['main']
  pull_request:
    branches: ["dev","prod"]
jobs:
    build-and-test:
      runs-on: ubuntu-22.04
      steps:
          - name: Checkout Code
            uses: actions/checkout@v6
        
          - name: Setup Docker BuildX
            uses: docker/setup-buildx-action@v4
        
          - name: Build Docker Image
            run: docker.build -t ${{ secrets.IMAGE.NAME }}
        
          - name: Install Trivy
            uses: aquasecurity/trivy-actions@v0.36.0
            with:
              scan-type: 'image'
              image-ref: ${{ secrets.IMAGE.NAME }}:latest"
              format: 'table'
              exit-code :'0'
              ignore-unfixed: true
              
        
