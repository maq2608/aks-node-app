name: Project Workflow
on:
  push:
   branches: ['main']
  pull_request:
    branches: ["dev","prod"]
jobs:
    build-and-test:
      runs-on: ubuntu-22.04
      steps:
          - name: Checkout Code
            uses: actions/checkout@v6
        
          - name: Setup Docker BuildX
            uses: docker/setup-buildx-action@v4
        
          - name: Build Docker Image
            run: docker build -t ${{ secrets.IMG_NAME }}  .
        
          - name: Install Trivy
            uses: aquasecurity/trivy-action@v0.36.0
            with:
              scan-type: 'image'
              image-ref: "${{secrets.IMG_NAME}}:latest"
              format: 'table'
              exit-code: '0'
              ignore-unfixed: true
              
          - name: Login to ACR
            uses: docker/login-action@v3
            with:
              registry: ${{ secrets.AZURE_REGISTRY_SERVER }}
              username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
              password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

          - name: Tag Image for ACR
            run: |
             docker tag ${{ secrets.IMG_NAME }}: latest ${{ secrets.AZURE_REGISTRY_SERVER }}/${{ secrets.IMG_NAME }}:latest

          - name: Push the image to ACR
            run:
             docker push ${{ secrets.AZURE_REGISTRY_SERVER }}/${{ secrets.AZURE_REGISTRY_SERVER }}
          
              
        
